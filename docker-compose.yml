services:
  app:
    build:
      context: .
      target: dev
      args:
        APK_UPGRADE: "false"
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radiocalico
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d radiocalico"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
